version: 2

repo_summary:
  product_docs_entrypoints:
    - "README.md"
    - "AGENTS.md"
    - "docs/README.md"
    - "docs/architecture/"
    - "docs/architecture/clean-room-carry-forward.md"
    - "docs/specs/"
    - "pyproject.toml"
    - "build_backend/mylittleharness_build.py"
    - "src/mylittleharness/"
    - "tests/"
    - ".mylittleharness/project-workflow.toml"
    - "project/project-state.md"
    - "project/specs/workflow/"
  notes: >-
    This repository contains the MyLittleHarness package, tests, docs, and compatibility fixtures.
    In shipped product behavior, commands act on an explicit target repository supplied by the operator.
    The workflow-shaped files in this tree are minimal product compatibility fixtures for the CLI/tests, not live workflow memory.
    Reusable product architecture and specs live under docs/.
    No active implementation plan, archived plan, research corpus, raw intake, package mirror, runtime debris, cache, or generated validation artifact belongs here.

cross_cutting_surfaces:
  - surface: "Product source posture"
    docs:
      - "README.md"
      - "AGENTS.md"
      - "docs/README.md"
      - "project/project-state.md"
    triggers:
      - "product source"
      - "target root"
      - "operating root"
      - "memory root"
      - "product source checkout"
      - "package smoke"
      - "bootstrap"
      - "install"
      - "console script"
      - "MyLittleHarness"

  - surface: "Product architecture docs"
    docs:
      - "docs/README.md"
      - "docs/architecture/"
      - "docs/specs/"
    triggers:
      - "product architecture"
      - "product docs"
      - "layer model"
      - "authority"
      - "memory"
      - "snapshot"
      - "rollback"
      - "generated state"
      - "projection"
      - "semantic"
      - "semantic readiness"
      - "adapter"
      - "product boundary"
      - "docs scaffold"
      - "clean-room"
      - "carry-forward"
      - "operating project root"
      - "operating project"
      - "operating/research pilot"

  - surface: "Compatibility fixtures"
    docs:
      - ".mylittleharness/project-workflow.toml"
      - ".agents/docmap.yaml"
      - "project/project-state.md"
      - "project/specs/workflow/"
    triggers:
      - "workflow-core"
      - "fixture"
      - "manifest"
      - "docmap"
      - "project-state"
      - "workflow spec"
      - "validate"
      - "doctor"

  - surface: "Analyzer CLI"
    docs:
      - "README.md"
      - "docs/specs/attach-repair-status-cli.md"
      - "project/project-state.md"
      - ".agents/docmap.yaml"
    triggers:
      - "mylittleharness"
      - "package"
      - "package smoke"
      - "bootstrap"
      - "install"
      - "console script"
      - "pyproject"
      - "CLI"
      - "command"
      - "tasks"
      - "status"
      - "validate"
      - "context-budget"
      - "audit-links"
      - "doctor"
      - "preflight"
      - "semantic"
      - "semantic readiness"
      - "intelligence"
      - "evidence"
      - "closeout"
      - "plan"
      - "adapter"
      - "preflight"
      - "MCP read projection"
      - "VCS"
      - "Git"
      - "projection"
      - "projection artifacts"
      - "repo-map"
      - "backlink"
      - "search"
      - "fan-in"
      - "attach"
      - "repair"
      - "snapshot"
      - "rollback"
      - "dry-run"
      - "hygiene"
      - "product debris"
      - "exit code"
      - "report output"

rules:
  - area: "Analyzer CLI"
    code:
      - "pyproject.toml"
      - "build_backend/mylittleharness_build.py"
      - "src/mylittleharness/**"
      - "tests/**"
    canonical_docs:
      - "README.md"
      - "docs/specs/attach-repair-status-cli.md"
      - "project/project-state.md"
    related_docs:
      - "docs/specs/authority-and-memory.md"
      - "docs/specs/metadata-routing-and-evidence.md"
      - "docs/specs/operating-root.md"
      - "docs/architecture/product-architecture.md"
      - "docs/architecture/layer-model.md"
      - ".agents/docmap.yaml"
    triggers:
      - "mylittleharness"
      - "package"
      - "package smoke"
      - "install"
      - "console script"
      - "pyproject"
      - "command"
      - "flag"
      - "output"
      - "exit behavior"
      - "tasks"
      - "bootstrap"
      - "read-only validator"
      - "context budget"
      - "audit links"
      - "doctor"
      - "preflight"
      - "semantic"
      - "semantic readiness"
      - "intelligence"
      - "evidence"
      - "closeout"
      - "plan"
      - "VCS"
      - "Git"
      - "adapter"
      - "preflight"
      - "MCP read projection"
      - "projection"
      - "projection artifacts"
      - "repo-map"
      - "backlink"
      - "search"
      - "fan-in"
      - "closeout"
      - "VCS"
      - "Git"
      - "attach"
      - "repair"
      - "snapshot"
      - "rollback"
      - "dry-run"
      - "hygiene"
      - "product debris"
      - "forbidden generated files"
    cascade_rules:
      - when:
          - "command change"
          - "flag change"
          - "output change"
          - "exit behavior change"
        check:
          - "README.md"
          - "project/project-state.md"
        update_when: "CLI usage, report sections, exit behavior, or fixture expectations would otherwise drift"
      - when:
          - "snapshot change"
          - "rollback change"
          - "existing-content repair change"
        check:
          - "docs/specs/authority-and-memory.md"
          - "docs/specs/metadata-routing-and-evidence.md"
          - "docs/specs/operating-root.md"
          - "docs/architecture/product-architecture.md"
          - "docs/architecture/layer-model.md"
          - "README.md"
          - "project/project-state.md"
        update_when: "snapshot authority, root boundary, metadata, retention, rollback, or product-source hygiene wording would otherwise drift"

  - area: "Compatibility fixture workflow contract"
    code:
      - ".mylittleharness/project-workflow.toml"
      - "project/project-state.md"
      - "project/specs/workflow/**"
    canonical_docs:
      - "project/project-state.md"
      - "project/specs/workflow/workflow-artifact-model-spec.md"
    related_docs:
      - "README.md"
      - "AGENTS.md"
      - ".agents/docmap.yaml"
    triggers:
      - "artifact model"
      - "plan synthesis"
      - "verification"
      - "closeout"
      - "rollout"
      - "capability roadmap"
      - "workflow contract"
      - "fixture"
      - "root boundary"
    cascade_rules:
      - when:
          - "stable workflow rule change"
          - "fixture boundary change"
          - "root boundary change"
        check:
          - "README.md"
          - "AGENTS.md"
          - ".agents/docmap.yaml"
          - "project/project-state.md"
        update_when: "product-source posture, fixture routing, or root-boundary wording would otherwise drift"
